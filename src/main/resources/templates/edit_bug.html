<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Bug</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .bug-form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .form-body {
            padding: 30px;
        }
        .btn-update {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
        }
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240,147,251,0.4);
        }
        .btn-cancel {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
        }
        .btn-cancel:hover {
            background: #5a6268;
            color: white;
        }
        .form-label {
            font-weight: bold;
            color: #333;
        }
        .bug-id {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="bug-form-container">
                    <div class="form-header">
                        <h2>✏️ Edit Bug #<span th:text="${bug.id}"></span></h2>
                        <p>Update bug information</p>
                    </div>
                    <div class="form-body">
                        <div class="bug-id">
                            <strong>Bug ID:</strong> <span th:text="${bug.id}"></span> |
                            <strong>Created:</strong> <span th:text="${bug.createdDate}"></span>
                        </div>
                        
                        <form th:action="@{/updateBug/{id}(id=${bug.id})}" th:object="${bug}" method="post">
                            <!-- Bug Title -->
                            <div class="mb-4">
                                <label class="form-label required">Bug Title</label>
                                <input type="text" th:field="*{title}" class="form-control form-control-lg" required>
                            </div>
                            
                            <!-- Description -->
                            <div class="mb-4">
                                <label class="form-label required">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="5" required></textarea>
                            </div>
                            
                            <div class="row">
                                <!-- Priority -->
                                <div class="col-md-6 mb-4">
                                    <label class="form-label required">Priority</label>
                                    <select th:field="*{priority}" class="form-select" required>
                                        <option value="HIGH">🔴 HIGH - Critical</option>
                                        <option value="MEDIUM">🟡 MEDIUM - Major</option>
                                        <option value="LOW">🟢 LOW - Minor</option>
                                    </select>
                                </div>
                                
                                <!-- Status -->
                                <div class="col-md-6 mb-4">
                                    <label class="form-label required">Status</label>
                                    <select th:field="*{status}" class="form-select" required>
                                        <option value="OPEN">🟢 OPEN - Not started</option>
                                        <option value="IN_PROGRESS">🟡 IN PROGRESS - Being worked on</option>
                                        <option value="RESOLVED">🔵 RESOLVED - Fixed, pending verification</option>
                                        <option value="CLOSED">⚫ CLOSED - Verified and closed</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- Assigned To -->
                            <div class="mb-4">
                                <label class="form-label">Assigned To</label>
                                <input type="text" th:field="*{assignedTo}" class="form-control" 
                                       placeholder="Developer name">
                            </div>
                            
                            <!-- Resolved Date (show if resolved) -->
                            <div class="mb-4" th:if="${bug.status == 'RESOLVED' or bug.status == 'CLOSED'}">
                                <label class="form-label">Resolved Date</label>
                                <input type="text" th:value="${bug.resolvedDate}" class="form-control" readonly disabled>
                                <small class="text-muted">Automatically set when resolving</small>
                            </div>
                            
                            <!-- Form Actions -->
                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/}" class="btn-cancel">❌ Cancel</a>
                                <button type="submit" class="btn-update">💾 Update Bug</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
