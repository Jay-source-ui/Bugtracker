<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report New Bug</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .bug-form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .form-body {
            padding: 30px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .btn-cancel {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
        }
        .required:after {
            content: " *";
            color: red;
        }
        .info-card {
            background-color: #e8f4f8;
            border-left: 4px solid #667eea;
            padding: 10px 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="bug-form-container">
                    <div class="form-header">
                        <h2>🐞 Report New Bug</h2>
                        <p>Help us improve by reporting issues you find</p>
                    </div>
                    <div class="form-body">
                        <div class="info-card">
                            <i class="fas fa-info-circle"></i> 
                            You are logged in as: <strong th:text="${currentUserRole}"></strong>
                        </div>
                        
                        <form th:action="@{/saveBug}" th:object="${bug}" method="post" enctype="multipart/form-data">
                            <!-- Bug Title -->
                            <div class="mb-4">
                                <label class="form-label required">Bug Title</label>
                                <input type="text" th:field="*{title}" class="form-control form-control-lg" 
                                       placeholder="Enter a clear and descriptive title" required>
                            </div>
                            
                            <!-- Description -->
                            <div class="mb-4">
                                <label class="form-label required">Description</label>
                                <textarea th:field="*{description}" class="form-control" rows="5" 
                                          placeholder="Describe the bug in detail..." required></textarea>
                            </div>
                            
                            <!-- Priority -->
                            <div class="mb-4">
                                <label class="form-label required">Priority Level</label>
                                <select th:field="*{priority}" class="form-select form-select-lg" required>
                                    <option value="">Select priority...</option>
                                    <option value="HIGH">🔴 HIGH - Critical issue</option>
                                    <option value="MEDIUM">🟡 MEDIUM - Major issue</option>
                                    <option value="LOW">🟢 LOW - Minor issue</option>
                                </select>
                            </div>
                            
                            <!-- Assignment Dropdown -->
                            <div class="mb-4" th:if="${assignableUsers != null and not #lists.isEmpty(assignableUsers)}">
                                <label class="form-label">
                                    <i class="fas fa-exchange-alt"></i> 
                                    <span th:if="${currentUserRole == 'DEVELOPER'}">Assign to Tester</span>
                                    <span th:if="${currentUserRole == 'TESTER'}">Assign to Developer</span>
                                    <span th:if="${currentUserRole == 'ADMIN'}">Assign to Team Member</span>
                                </label>
                                <select name="assignedToId" class="form-select form-select-lg">
                                    <option value="">-- Select User (Optional) --</option>
                                    <option th:each="user : ${assignableUsers}" 
                                            th:value="${user.id}" 
                                            th:text="${user.fullName + ' (' + user.role + ')'}">
                                    </option>
                                </select>
                            </div>
                            
                            <!-- File Attachment Section - NEW -->
                            <div class="mb-4">
                                <label class="form-label"><i class="fas fa-paperclip"></i> Attachments (Optional)</label>
                                <input type="file" name="file" class="form-control" accept="image/*,.pdf,.txt,.doc,.docx">
                                <small class="text-muted">Upload screenshots or documents (Max: 10MB)</small>
                            </div>
                            
                            <!-- Hidden fields -->
                            <input type="hidden" th:field="*{status}" value="OPEN"/>
                            <input type="hidden" th:field="*{createdDate}" />
                            
                            <!-- Form Actions -->
                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/}" class="btn-cancel">❌ Cancel</a>
                                <button type="submit" class="btn-submit">✅ Submit Bug Report</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
