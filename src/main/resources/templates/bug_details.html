<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bug Details - Bug Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .details-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .comment-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        .comment {
            background: white;
            border-left: 3px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .comment-user {
            font-weight: bold;
            color: #667eea;
        }
        .comment-date {
            font-size: 12px;
            color: #666;
        }
        .attachment-item {
            background: #f8f9fa;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="details-container">
            <h2><i class="fas fa-bug"></i> Bug Details</h2>
            <hr>
            
            <!-- Bug Information -->
            <div class="row">
                <div class="col-md-6">
                    <p><strong>ID:</strong> <span th:text="${bug.id}"></span></p>
                    <p><strong>Title:</strong> <span th:text="${bug.title}"></span></p>
                    <p><strong>Priority:</strong> 
                        <span th:class="'badge ' + (${bug.priority} == 'HIGH' ? 'bg-danger' : (${bug.priority} == 'MEDIUM' ? 'bg-warning' : 'bg-success'))" 
                              th:text="${bug.priority}"></span>
                    </p>
                </div>
                <div class="col-md-6">
                    <p><strong>Status:</strong>
                        <span th:class="'badge ' + (${bug.status} == 'OPEN' ? 'bg-danger' : (${bug.status} == 'RESOLVED' ? 'bg-success' : 'bg-warning'))" 
                              th:text="${bug.status}"></span>
                    </p>
                    <p><strong>Assigned To:</strong> <span th:text="${bug.assignedTo != null ? bug.assignedTo : 'Unassigned'}"></span></p>
                    <p><strong>Created:</strong> <span th:text="${bug.createdDate}"></span></p>
                </div>
            </div>
            
            <div class="mb-4">
                <p><strong>Description:</strong></p>
                <p class="border p-3 rounded bg-light" th:text="${bug.description}"></p>
            </div>
            
            <!-- File Attachment Section -->
            <div class="card mt-4">
                <div class="card-header bg-primary text-white">
                    <i class="fas fa-paperclip"></i> Attachments
                </div>
                <div class="card-body">
                    <!-- Upload Form -->
                    <form th:action="@{/upload/{id}(id=${bug.id})}" method="post" enctype="multipart/form-data" class="mb-4">
                        <div class="row">
                            <div class="col-md-8">
                                <input type="file" name="file" class="form-control" accept="image/*,.pdf,.txt">
                                <small class="text-muted">Max file size: 10MB. Allowed: Images, PDF, Documents</small>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-upload"></i> Upload File
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <!-- Attachments List -->
                    <div th:if="${attachments != null and not #lists.isEmpty(attachments)}">
                        <h6>Uploaded Files:</h6>
                        <div class="list-group">
                            <div th:each="attachment : ${attachments}" class="list-group-item">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <i class="fas fa-file-alt"></i>
                                        <span th:text="${attachment.fileName}"></span>
                                        <small class="text-muted">
                                            (<span th:text="${attachment.fileSize}"></span> bytes)
                                        </small>
                                    </div>
                                    <div>
                                        <a th:href="@{/download/{id}(id=${attachment.id})}" 
                                           class="btn btn-sm btn-outline-success">
                                            <i class="fas fa-download"></i> Download
                                        </a>
                                        <a th:href="@{/deleteAttachment/{id}(id=${attachment.id})}" 
                                           class="btn btn-sm btn-outline-danger"
                                           onclick="return confirm('Delete this attachment?')">
                                            <i class="fas fa-trash"></i> Delete
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:unless="${attachments != null and not #lists.isEmpty(attachments)}" class="text-muted text-center">
                        <i class="fas fa-paperclip"></i> No attachments yet.
                    </div>
                </div>
            </div>
            
            <!-- Comment Section -->
            <div class="comment-section">
                <h4><i class="fas fa-comments"></i> Comments</h4>
                <hr>
                
                <!-- Add Comment Form -->
                <form th:action="@{/addComment/{id}(id=${bug.id})}" method="post" class="mb-4">
                    <div class="mb-3">
                        <textarea name="content" class="form-control" rows="3" 
                                  placeholder="Add your comment..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Post Comment
                    </button>
                </form>
                
                <!-- Comments List -->
                <div th:if="${comments != null and not #lists.isEmpty(comments)}">
                    <div th:each="comment : ${comments}" class="comment">
                        <div class="comment-user">
                            <i class="fas fa-user-circle"></i> <span th:text="${comment.user.username}"></span>
                            <span class="comment-date float-end" th:text="${comment.createdDate}"></span>
                        </div>
                        <div class="mt-2" th:text="${comment.content}"></div>
                    </div>
                </div>
                <div th:unless="${comments != null and not #lists.isEmpty(comments)}" class="text-muted text-center">
                    <i class="fas fa-comment"></i> No comments yet.
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="/" class="btn btn-secondary">Back to Bugs</a>
            </div>
        </div>
    </div>
</body>
</html>
